<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#FF6B00"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>QUIZ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    input[type=color] { -webkit-appearance: none; cursor: pointer; }
    input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type=color]::-webkit-color-swatch { border: none; border-radius: 4px; }
    ::placeholder { color: rgba(255,255,255,0.45); }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ─── DATA ────────────────────────────────────────────────────────────────────
const INITIAL_QUESTIONS = [
  { id: 1, text: "Care este capitala României?", options: ["Cluj-Napoca", "Timișoara", "București", "Iași"], correct: 2 },
  { id: 2, text: "Câte culori are steagul României?", options: ["2", "3", "4", "5"], correct: 1 },
  { id: 3, text: "Ce fluviu trece prin București?", options: ["Dunărea", "Siretul", "Dâmbovița", "Oltul"], correct: 2 },
];
const INITIAL_PRIZES = [
  { id: 1, name: "🎁 Voucher 50 RON", quantity: 5 },
  { id: 2, name: "☕ Cafea gratuită", quantity: 10 },
  { id: 3, name: "🏆 Tricou Brand Motion", quantity: 3 },
  { id: 4, name: "🎫 Bilet eveniment", quantity: 2 },
];
const LETTERS = ["A","B","C","D","E","F"];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function buildBgStyle(bg) {
  if (!bg || bg.type === "gradient")
    return { background: `linear-gradient(135deg, ${bg?.color1||"#FF6B00"} 0%, ${bg?.color2||"#FF5500"} 100%)` };
  if (bg.type === "solid") return { background: bg.color1 };
  if (bg.type === "image" && bg.image)
    return { backgroundImage:`url(${bg.image})`, backgroundSize:"cover", backgroundPosition:"center" };
  return { background:"linear-gradient(135deg,#FF6B00,#FF5500)" };
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function Confetti({ active }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!active) return;
    const cv = ref.current;
    const ctx = cv.getContext("2d");
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    const pieces = Array.from({ length: 140 }, () => ({
      x: Math.random()*cv.width, y: Math.random()*-cv.height,
      r: Math.random()*7+3, d: Math.random()*2+1,
      color: ["#FF6B00","#FF9A3C","#fff","#FFD700","#FF4500"][Math.floor(Math.random()*5)],
      tilt:0, ta:0, ts: Math.random()*0.1+0.04,
    }));
    let fr;
    const draw = () => {
      ctx.clearRect(0,0,cv.width,cv.height);
      pieces.forEach(p => {
        ctx.beginPath(); ctx.lineWidth=p.r/2; ctx.strokeStyle=p.color;
        ctx.moveTo(p.x+p.tilt+p.r/3, p.y);
        ctx.lineTo(p.x+p.tilt, p.y+p.tilt+p.r/5); ctx.stroke();
        p.y+=p.d+1; p.ta+=p.ts; p.tilt=Math.sin(p.ta)*14;
        if (p.y>cv.height) { p.y=-10; p.x=Math.random()*cv.width; }
      });
      fr = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(fr);
  }, [active]);
  if (!active) return null;
  return <canvas ref={ref} style={{position:"fixed",top:0,left:0,pointerEvents:"none",zIndex:9999,width:"100%",height:"100%"}}/>;
}

// ─── PASSWORD MODAL ──────────────────────────────────────────────────────────
function PwdModal({ adminPwd, setAdminPwd, pwdErr, setPwdErr, onLogin, onClose }) {
  return (
    <div style={S.modal}>
      <div style={S.modalCard}>
        <h3 style={S.modalTitle}>🔒 Acces Admin</h3>
        <input
          style={S.input} type="password" placeholder="Parolă..."
          value={adminPwd}
          onChange={e => { setAdminPwd(e.target.value); setPwdErr(false); }}
          onKeyDown={e => e.key==="Enter" && onLogin()}
          autoFocus
        />
        {pwdErr && <p style={{color:"#ff8888",marginTop:4,fontSize:13}}>Parolă incorectă.</p>}
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button style={S.btnPrimary} onClick={onLogin}>Intră</button>
          <button style={S.btnSecondary} onClick={onClose}>Anulează</button>
        </div>
      </div>
    </div>
  );
}

// ─── QUIZ SCREEN ─────────────────────────────────────────────────────────────
function QuizScreen({ questions, prizes, onReset, onAdmin, bgStyle }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answers, setAnswers] = useState([]);
  const [done, setDone] = useState(false);
  const [prize, setPrize] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [availablePrizes, setAvailablePrizes] = useState(prizes);
  const [animIn, setAnimIn] = useState(true);

  const q = questions[current];
  const progress = Math.round((current / questions.length) * 100);

  const handleSelect = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
    const isCorrect = idx === q.correct;
    const newAnswers = [...answers, { questionId: q.id, selectedIdx: idx, correct: isCorrect }];
    setAnswers(newAnswers);

    setTimeout(() => {
      if (current + 1 < questions.length) {
        setAnimIn(false);
        setTimeout(() => { setCurrent(c => c+1); setSelected(null); setAnimIn(true); }, 250);
      } else {
        const allCorrect = newAnswers.every(a => a.correct);
        if (allCorrect) {
          const pool = availablePrizes.filter(p => p.quantity > 0);
          if (pool.length > 0) {
            const winner = pool[Math.floor(Math.random()*pool.length)];
            setPrize(winner);
            setAvailablePrizes(prev => prev.map(p => p.id===winner.id ? {...p,quantity:p.quantity-1} : p));
          } else {
            setPrize({ name:"🎉 Toate premiile au fost câștigate!" });
          }
          setShowConfetti(true);
          setTimeout(() => setShowConfetti(false), 6000);
        }
        setDone(true);
      }
    }, 700);
  };

  const rootStyle = {...S.root, ...bgStyle};

  if (questions.length === 0) {
    return (
      <div style={rootStyle}>
        <div style={S.centerCard}>
          <p style={S.emptyText}>Nu există întrebări. Adaugă din Admin.</p>
          <button style={S.btnPrimary} onClick={onReset}>← Acasă</button>
        </div>
      </div>
    );
  }

  // RESULTS
  if (done) {
    const allCorrect = answers.every(a => a.correct);
    return (
      <div style={rootStyle}>
        <Confetti active={showConfetti}/>
        <div style={S.centerCard}>
          {allCorrect ? (
            <div style={S.finalCard}>
              <h2 style={S.finalTitle}>Felicitări!</h2>
              <p style={S.finalSubtitle}>Ai răspuns corect la toate întrebările!</p>
              {prize && (
                <div style={S.prizeBox}>
                  <span style={S.prizeLabel}>PREMIUL TĂU</span>
                  <span style={S.prizeName}>{prize.name}</span>
                </div>
              )}
              <button style={S.btnStart} onClick={onReset}>Start Again</button>
            </div>
          ) : (
            <div style={S.finalCard}>
              <h2 style={S.finalTitle}>Mai încearcă data viitoare!</h2>
              <p style={S.finalSubtitle}>Nu ai reușit de data aceasta, dar nu te descuraja!</p>
              <p style={S.finalSubtitle}>Studiază întrebările și încearcă din nou —<br/>premiul te așteaptă!</p>
              <button style={S.btnStart} onClick={onReset}>Start Again</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // QUESTION
  return (
    <div style={rootStyle}>
      <div style={S.quizWrap}>
        <div style={S.quizTopBar}>
          <button style={S.resetBtn} onClick={onReset}>↺ Restart Quiz</button>
          <div onClick={onAdmin} style={{width:48,height:40,cursor:"default"}}/>
        </div>
        <div style={S.progressRow}>
          <div style={S.progressBar}>
            <div style={{...S.progressFill, width:`${progress}%`}}/>
          </div>
          <span style={S.progressLabel}>{current+1}/{questions.length}</span>
        </div>
        <div style={{...S.questionCard, opacity:animIn?1:0, transform:animIn?"translateY(0)":"translateY(10px)", transition:"all 0.25s ease"}}>
          <div style={S.qNumBadge}>Întrebarea {current+1}</div>
          <p style={S.questionText}>{q.text}</p>
        </div>
        <div style={S.optionsList}>
          {q.options.map((opt, idx) => {
            const isSel = selected===idx;
            return (
              <button key={idx}
                style={{
                  ...S.optionRow,
                  ...(isSel ? S.optionSelected : {}),
                  opacity:animIn?1:0,
                  transform:animIn?"translateX(0)":"translateX(-12px)",
                  transition:`all 0.25s ease ${idx*60}ms`,
                  cursor: selected!==null?"default":"pointer",
                }}
                onClick={() => handleSelect(idx)}
              >
                <span style={{...S.optionLetter, ...(isSel?S.optionLetterSelected:{})}}>
                  {LETTERS[idx]}
                </span>
                <span style={S.optionText}>{opt}</span>
                {isSel && <span style={S.optionCheck}>●</span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── ADMIN SCREEN ────────────────────────────────────────────────────────────
function AdminScreen({ questions, setQuestions, prizes, setPrizes, bg, setBg, onBack }) {
  const [tab, setTab] = useState("questions");
  const [qText, setQText] = useState("");
  const [qOpts, setQOpts] = useState(["",""]);
  const [qCorrect, setQCorrect] = useState(0);
  const [editingQ, setEditingQ] = useState(null);
  const [pName, setPName] = useState("");
  const [pQty, setPQty] = useState(1);
  const [bgType, setBgType] = useState(bg.type||"gradient");
  const [bgColor1, setBgColor1] = useState(bg.color1||"#FF6B00");
  const [bgColor2, setBgColor2] = useState(bg.color2||"#FF5500");
  const [bgImage, setBgImage] = useState(bg.image||null);
  const fileRef = useRef(null);

  const applyBg = () => setBg({ type:bgType, color1:bgColor1, color2:bgColor2, image:bgImage });
  const handleImgUpload = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => { setBgImage(ev.target.result); setBgType("image"); };
    r.readAsDataURL(f);
  };

  const addOpt = () => { if (qOpts.length<6) setQOpts([...qOpts,""]); };
  const removeOpt = i => {
    if (qOpts.length<=2) return;
    const u = qOpts.filter((_,j)=>j!==i);
    setQOpts(u);
    if (qCorrect>=u.length) setQCorrect(u.length-1);
  };
  const updateOpt = (i,v) => { const o=[...qOpts]; o[i]=v; setQOpts(o); };

  const saveQ = () => {
    if (!qText.trim()||qOpts.some(o=>!o.trim())) return;
    if (editingQ!==null) {
      setQuestions(prev=>prev.map(q=>q.id===editingQ?{id:editingQ,text:qText,options:[...qOpts],correct:qCorrect}:q));
      setEditingQ(null);
    } else {
      setQuestions(prev=>[...prev,{id:Date.now(),text:qText,options:[...qOpts],correct:qCorrect}]);
    }
    setQText(""); setQOpts(["",""]); setQCorrect(0);
  };

  const editQ = q => { setEditingQ(q.id); setQText(q.text); setQOpts([...q.options]); setQCorrect(q.correct); setTab("questions"); window.scrollTo({top:0,behavior:"smooth"}); };
  const delQ = id => setQuestions(prev=>prev.filter(q=>q.id!==id));
  const saveP = () => { if (!pName.trim()) return; setPrizes(prev=>[...prev,{id:Date.now(),name:pName,quantity:Number(pQty)}]); setPName(""); setPQty(1); };
  const updQty = (id,v) => setPrizes(prev=>prev.map(p=>p.id===id?{...p,quantity:Math.max(0,Number(v))}:p));
  const delP = id => setPrizes(prev=>prev.filter(p=>p.id!==id));

  return (
    <div style={{...S.root, background:"linear-gradient(135deg,#FF6B00,#FF5500)"}}>
      <div style={S.adminWrap}>
        <div style={S.adminHeader}>
          <button style={S.backBtn} onClick={onBack}>← Înapoi</button>
          <h2 style={S.adminTitle}>🛠 Admin</h2>
        </div>
        <div style={S.tabs}>
          {["questions","prizes","design"].map(t=>(
            <button key={t} style={tab===t?S.tabActive:S.tab} onClick={()=>setTab(t)}>
              {t==="questions"?`❓ Întrebări (${questions.length})`:t==="prizes"?`🎁 Premii (${prizes.length})`:"🎨 Design"}
            </button>
          ))}
        </div>

        {tab==="questions" && (
          <div style={S.adminSection}>
            <div style={S.adminCard}>
              <h3 style={S.cardTitle}>{editingQ?"✏️ Editează":"➕ Adaugă întrebare"}</h3>
              <input style={S.input} placeholder="Textul întrebării..." value={qText} onChange={e=>setQText(e.target.value)}/>
              <p style={S.hint}>Bifează radio-ul pentru răspunsul corect (2–6 variante).</p>
              {qOpts.map((opt,i)=>(
                <div key={i} style={S.optRow}>
                  <label style={S.radioWrap}>
                    <input type="radio" name="correct" checked={qCorrect===i} onChange={()=>setQCorrect(i)} style={{accentColor:"#FF6B00"}}/>
                    <span style={{color:"#FF6B00",fontWeight:700,marginLeft:4,minWidth:18}}>{LETTERS[i]}</span>
                  </label>
                  <input style={{...S.input,marginBottom:0,flex:1}} placeholder={`Opțiunea ${LETTERS[i]}`} value={opt} onChange={e=>updateOpt(i,e.target.value)}/>
                  {qOpts.length>2 && <button style={S.removeOptBtn} onClick={()=>removeOpt(i)}>✕</button>}
                </div>
              ))}
              <div style={{display:"flex",gap:8,margin:"10px 0 14px"}}>
                {qOpts.length<6 && <button style={S.addOptBtn} onClick={addOpt}>+ Adaugă variantă</button>}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button style={S.btnPrimary} onClick={saveQ}>{editingQ?"Salvează":"Adaugă"}</button>
                {editingQ && <button style={S.btnSecondary} onClick={()=>{setEditingQ(null);setQText("");setQOpts(["",""]);setQCorrect(0);}}>Anulează</button>}
              </div>
            </div>
            <div style={S.listWrap}>
              {questions.length===0 && <p style={S.emptyText}>Nicio întrebare.</p>}
              {questions.map((q,i)=>(
                <div key={q.id} style={S.listItem}>
                  <div style={S.listItemContent}>
                    <span style={S.listNum}>{i+1}.</span>
                    <div style={{minWidth:0}}>
                      <p style={S.listTitle}>{q.text}</p>
                      <p style={S.listSub}>{q.options.length} variante · Corect: <strong style={{color:"#FFD700"}}>{q.options[q.correct]}</strong></p>
                    </div>
                  </div>
                  <div style={S.listActions}>
                    <button style={S.editBtn} onClick={()=>editQ(q)}>✏️</button>
                    <button style={S.deleteBtn} onClick={()=>delQ(q.id)}>🗑️</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="prizes" && (
          <div style={S.adminSection}>
            <div style={S.adminCard}>
              <h3 style={S.cardTitle}>➕ Adaugă premiu</h3>
              <input style={S.input} placeholder="Numele premiului (ex: 🎁 Voucher 100 RON)" value={pName} onChange={e=>setPName(e.target.value)}/>
              <div style={{...S.optRow,marginBottom:0}}>
                <label style={{color:"#fff",marginRight:8,fontSize:14,whiteSpace:"nowrap"}}>Cantitate:</label>
                <input type="number" min={0} style={{...S.input,marginBottom:0,width:90}} value={pQty} onChange={e=>setPQty(e.target.value)}/>
              </div>
              <button style={{...S.btnPrimary,marginTop:14}} onClick={saveP}>Adaugă</button>
            </div>
            <div style={S.listWrap}>
              {prizes.length===0 && <p style={S.emptyText}>Niciun premiu.</p>}
              {prizes.map(p=>(
                <div key={p.id} style={S.listItem}>
                  <span style={S.listTitle}>{p.name}</span>
                  <div style={S.listActions}>
                    <div style={S.qtyWrap}>
                      <button style={S.qtyBtn} onClick={()=>updQty(p.id,p.quantity-1)}>−</button>
                      <span style={S.qtyNum}>{p.quantity}</span>
                      <button style={S.qtyBtn} onClick={()=>updQty(p.id,p.quantity+1)}>+</button>
                    </div>
                    <button style={S.deleteBtn} onClick={()=>delP(p.id)}>🗑️</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="design" && (
          <div style={S.adminSection}>
            <div style={S.adminCard}>
              <h3 style={S.cardTitle}>🎨 Background quiz</h3>
              <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                {["gradient","solid","image"].map(t=>(
                  <button key={t} style={bgType===t?S.tabActive:S.tab} onClick={()=>setBgType(t)}>
                    {t==="gradient"?"🌈 Gradient":t==="solid"?"🟧 Culoare":"🖼 Poză"}
                  </button>
                ))}
              </div>
              {bgType==="gradient" && (
                <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
                  <div style={S.colorRow}><label style={S.colorLabel}>Culoare 1</label><input type="color" value={bgColor1} onChange={e=>setBgColor1(e.target.value)} style={S.colorPicker}/><span style={S.colorHex}>{bgColor1}</span></div>
                  <div style={S.colorRow}><label style={S.colorLabel}>Culoare 2</label><input type="color" value={bgColor2} onChange={e=>setBgColor2(e.target.value)} style={S.colorPicker}/><span style={S.colorHex}>{bgColor2}</span></div>
                </div>
              )}
              {bgType==="solid" && (
                <div style={{marginBottom:12}}>
                  <div style={S.colorRow}><label style={S.colorLabel}>Culoare</label><input type="color" value={bgColor1} onChange={e=>setBgColor1(e.target.value)} style={S.colorPicker}/><span style={S.colorHex}>{bgColor1}</span></div>
                </div>
              )}
              {bgType==="image" && (
                <div style={{marginBottom:12}}>
                  <button style={S.uploadBtn} onClick={()=>fileRef.current.click()}>📁 Alege o poză de fundal</button>
                  <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImgUpload}/>
                  {bgImage && (
                    <div style={S.imgPreviewWrap}>
                      <img src={bgImage} alt="preview" style={S.imgPreview}/>
                      <button style={S.removeImgBtn} onClick={()=>{setBgImage(null);setBgType("gradient");}}>✕ Șterge poza</button>
                    </div>
                  )}
                  {!bgImage && <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginTop:8}}>Nicio poză selectată.</p>}
                </div>
              )}
              <div style={{...S.bgPreview, ...buildBgStyle({type:bgType,color1:bgColor1,color2:bgColor2,image:bgImage})}}>
                <span style={S.bgPreviewLabel}>Preview</span>
              </div>
              <button style={{...S.btnPrimary,marginTop:16}} onClick={applyBg}>✅ Aplică background</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ROOT ────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [questions, setQuestions] = useState(INITIAL_QUESTIONS);
  const [prizes, setPrizes] = useState(INITIAL_PRIZES);
  const [adminPwd, setAdminPwd] = useState("");
  const [showPwd, setShowPwd] = useState(false);
  const [pwdErr, setPwdErr] = useState(false);
  const [bg, setBg] = useState({type:"gradient",color1:"#FF6B00",color2:"#FF5500"});

  const tapCount = useRef(0);
  const tapTimer = useRef(null);
  const handleSecretTap = () => {
    tapCount.current++;
    clearTimeout(tapTimer.current);
    tapTimer.current = setTimeout(()=>{ tapCount.current=0; }, 1500);
    if (tapCount.current>=4) { tapCount.current=0; setShowPwd(true); }
  };

  const handleAdminLogin = () => {
    if (adminPwd==="admin123") { setScreen("admin"); setShowPwd(false); setAdminPwd(""); setPwdErr(false); }
    else setPwdErr(true);
  };

  const closeModal = () => { setShowPwd(false); setAdminPwd(""); setPwdErr(false); };
  const bgStyle = buildBgStyle(bg);

  if (screen==="admin") {
    return <AdminScreen questions={questions} setQuestions={setQuestions} prizes={prizes} setPrizes={setPrizes} bg={bg} setBg={setBg} onBack={()=>setScreen("home")}/>;
  }

  if (screen==="quiz") {
    return (
      <>
        <QuizScreen questions={questions} prizes={prizes} onReset={()=>setScreen("home")} onAdmin={()=>setShowPwd(true)} bgStyle={bgStyle}/>
        {showPwd && <PwdModal adminPwd={adminPwd} setAdminPwd={setAdminPwd} pwdErr={pwdErr} setPwdErr={setPwdErr} onLogin={handleAdminLogin} onClose={closeModal}/>}
      </>
    );
  }

  return (
    <div style={{...S.root,...bgStyle}}>
      <div onClick={handleSecretTap} style={{position:"fixed",top:0,right:0,width:80,height:80,zIndex:200,cursor:"default"}}/>
      <div style={S.homeContent}>
        <h1 style={S.homeTitle}>QUIZ</h1>
        <p style={S.homeSubtitle}>Răspunde corect la toate întrebările și câștigă un premiu!</p>
        <button style={S.btnStart} onClick={()=>setScreen("quiz")}>ÎNCEPE QUIZ-UL →</button>
      </div>
      {showPwd && <PwdModal adminPwd={adminPwd} setAdminPwd={setAdminPwd} pwdErr={pwdErr} setPwdErr={setPwdErr} onLogin={handleAdminLogin} onClose={closeModal}/>}
    </div>
  );
}

// ─── STYLES ──────────────────────────────────────────────────────────────────
